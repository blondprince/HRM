name: hrm.hrm_mamba3_act_v1@HierarchicalReasoningModel_Mamba3ACTV1
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

halt_exploration_prob: 0.1
halt_max_steps: 16

H_cycles: 2
L_cycles: 2

H_layers: 4
L_layers: 4

hidden_size: 512

# Mamba-3 specific hyperparameters
mamba_d_state_L: 128
mamba_d_state_H: 256
mamba_expand_L: 2.0
mamba_expand_H: 2.0
mamba_headdim: 64
mamba_ngroups: 1
mamba_mimo_rank: 4

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope

